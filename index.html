<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap');

#hra-wrap *,#hra-wrap *::before,#hra-wrap *::after{box-sizing:border-box;margin:0;padding:0;}
#hra-wrap{font-family:'Jost',sans-serif;color:#2C2C2A;background:#FDFCFA;width:100%;max-width:620px;margin:0 auto;padding:2.5rem 1.25rem 3rem;}
#hra-wrap .hra-hero{text-align:center;margin-bottom:2rem;}
#hra-wrap .hra-hero svg{display:block;margin:0 auto 1rem;opacity:0.65;}
#hra-wrap .hra-hero h1{font-family:'Cormorant Garamond',serif;font-size:1.85rem;font-weight:500;line-height:1.25;color:#2C2C2A;margin-bottom:0.65rem;letter-spacing:0.01em;}
#hra-wrap .hra-hero p{font-size:0.875rem;color:#5C5C58;line-height:1.7;max-width:400px;margin:0 auto;font-weight:300;}
#hra-wrap .hra-prog{display:flex;align-items:center;gap:10px;margin-bottom:1.75rem;}
#hra-wrap .hra-prog-track{flex:1;height:3px;background:rgba(44,44,42,0.12);border-radius:99px;overflow:hidden;}
#hra-wrap .hra-prog-fill{height:100%;background:#8A9E8C;border-radius:99px;transition:width 0.45s ease;width:0%;}
#hra-wrap .hra-prog-lbl{font-size:0.72rem;color:#9A9A94;white-space:nowrap;font-weight:400;letter-spacing:0.05em;}
#hra-wrap .hra-card{background:#FDFCFA;border:1px solid rgba(44,44,42,0.12);border-radius:12px;padding:1.5rem;margin-bottom:1rem;}
#hra-wrap .hra-qnum{font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:#8A9E8C;margin-bottom:0.5rem;font-weight:500;}
#hra-wrap .hra-qtext{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:500;color:#2C2C2A;line-height:1.4;margin-bottom:1.25rem;}
#hra-wrap .hra-opts{display:flex;flex-direction:column;gap:7px;}
#hra-wrap .hra-opt{display:flex;align-items:center;gap:11px;padding:10px 13px;border:1px solid rgba(44,44,42,0.12);border-radius:8px;background:transparent;font-family:'Jost',sans-serif;font-size:0.855rem;font-weight:300;color:#5C5C58;cursor:pointer;text-align:left;width:100%;line-height:1.4;transition:border-color 0.15s,background 0.15s,color 0.15s;}
#hra-wrap .hra-opt:hover{border-color:#C5D4C6;background:#EEF3EE;color:#2C2C2A;}
#hra-wrap .hra-opt.sel{border-color:#8A9E8C;background:#EEF3EE;color:#2C2C2A;}
#hra-wrap .hra-dot{width:14px;height:14px;min-width:14px;border-radius:50%;border:1.5px solid rgba(44,44,42,0.2);position:relative;flex-shrink:0;transition:background 0.15s,border-color 0.15s;}
#hra-wrap .hra-opt.sel .hra-dot{border-color:#8A9E8C;background:#8A9E8C;}
#hra-wrap .hra-opt.sel .hra-dot::after{content:'';position:absolute;top:3px;left:3px;right:3px;bottom:3px;background:white;border-radius:50%;}
#hra-wrap .hra-nav{display:flex;justify-content:space-between;align-items:center;margin-top:1.25rem;gap:10px;}
#hra-wrap .hra-back{padding:9px 16px;border:1px solid rgba(44,44,42,0.2);border-radius:8px;background:transparent;font-family:'Jost',sans-serif;font-size:0.83rem;font-weight:400;color:#9A9A94;cursor:pointer;}
#hra-wrap .hra-back:disabled{opacity:0.28;cursor:default;pointer-events:none;}
#hra-wrap .hra-next{padding:10px 24px;border:none;border-radius:8px;background:#8A9E8C;font-family:'Jost',sans-serif;font-size:0.855rem;font-weight:500;color:white;cursor:pointer;letter-spacing:0.03em;}
#hra-wrap .hra-next:disabled{opacity:0.32;cursor:default;pointer-events:none;}
#hra-wrap .hra-next:hover{background:#768E78;}

/* RESULTS */
#hra-wrap .hra-rhead{text-align:center;margin-bottom:1.5rem;}
#hra-wrap .hra-rhead h2{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:500;margin-bottom:0.4rem;color:#2C2C2A;}
#hra-wrap .hra-pill{display:inline-block;padding:3px 14px;border-radius:99px;font-size:0.72rem;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:0.65rem;}
#hra-wrap .hra-pill.pr{background:#EAF3DE;color:#3B6D11;}
#hra-wrap .hra-pill.pm{background:#FAEEDA;color:#854F0B;}
#hra-wrap .hra-pill.pe{background:#F5EFE6;color:#8C7355;}
#hra-wrap .hra-rintro{font-size:0.855rem;color:#5C5C58;line-height:1.7;font-weight:300;max-width:460px;margin:0 auto;}

/* SCORE METER */
#hra-wrap .hra-meter{background:#FDFCFA;border:1px solid rgba(44,44,42,0.12);border-radius:12px;padding:1.5rem;margin-bottom:1.25rem;text-align:center;}
#hra-wrap .hra-meter-title{font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:#9A9A94;font-weight:500;margin-bottom:1rem;}
#hra-wrap .hra-circle-wrap{position:relative;width:130px;height:130px;margin:0 auto 1rem;}
#hra-wrap .hra-circle-wrap svg{width:130px;height:130px;transform:rotate(-90deg);}
#hra-wrap .hra-circle-bg{fill:none;stroke:rgba(44,44,42,0.08);stroke-width:10;}
#hra-wrap .hra-circle-fg{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease;}
#hra-wrap .hra-circle-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
#hra-wrap .hra-circle-pct{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:500;color:#2C2C2A;line-height:1;}
#hra-wrap .hra-circle-sub{font-size:0.65rem;color:#9A9A94;letter-spacing:0.05em;text-transform:uppercase;margin-top:2px;}
#hra-wrap .hra-meter-legend{display:flex;justify-content:center;gap:1.25rem;flex-wrap:wrap;}
#hra-wrap .hra-legend-item{display:flex;align-items:center;gap:5px;font-size:0.72rem;color:#5C5C58;font-weight:300;}
#hra-wrap .hra-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
#hra-wrap .hra-legend-dot.g{background:#8A9E8C;}
#hra-wrap .hra-legend-dot.a{background:#C4A882;}
#hra-wrap .hra-legend-dot.r{background:#C4847A;}

/* CATEGORY BARS */
#hra-wrap .hra-bars{background:#FDFCFA;border:1px solid rgba(44,44,42,0.12);border-radius:12px;padding:1.5rem;margin-bottom:1.25rem;}
#hra-wrap .hra-bars-title{font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:#9A9A94;font-weight:500;margin-bottom:1.1rem;}
#hra-wrap .hra-bar-row{margin-bottom:0.85rem;}
#hra-wrap .hra-bar-row:last-child{margin-bottom:0;}
#hra-wrap .hra-bar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
#hra-wrap .hra-bar-lbl{font-size:0.78rem;font-weight:400;color:#2C2C2A;}
#hra-wrap .hra-bar-status{font-size:0.68rem;font-weight:500;padding:1px 8px;border-radius:99px;}
#hra-wrap .hra-bar-status.g{background:#EAF3DE;color:#3B6D11;}
#hra-wrap .hra-bar-status.a{background:#FAEEDA;color:#854F0B;}
#hra-wrap .hra-bar-status.r{background:#FCEBEB;color:#A32D2D;}
#hra-wrap .hra-bar-track{height:6px;background:rgba(44,44,42,0.08);border-radius:99px;overflow:hidden;}
#hra-wrap .hra-bar-fill{height:100%;border-radius:99px;transition:width 0.8s ease;}
#hra-wrap .hra-bar-fill.g{background:#8A9E8C;}
#hra-wrap .hra-bar-fill.a{background:#C4A882;}
#hra-wrap .hra-bar-fill.r{background:#C4847A;}

/* DETAIL BREAKDOWN */
#hra-wrap .hra-detail{margin-bottom:1.25rem;}
#hra-wrap .hra-detail-title{font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:#9A9A94;font-weight:500;margin-bottom:0.85rem;}
#hra-wrap .hra-ritem{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid rgba(44,44,42,0.08);}
#hra-wrap .hra-ritem:last-of-type{border-bottom:none;}
#hra-wrap .hra-rstatus{width:22px;height:22px;min-width:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:600;margin-top:1px;flex-shrink:0;}
#hra-wrap .sg{background:#EAF3DE;color:#3B6D11;}
#hra-wrap .sa{background:#FAEEDA;color:#854F0B;}
#hra-wrap .sr{background:#FCEBEB;color:#A32D2D;}
#hra-wrap .hra-rbody strong{display:block;font-size:0.855rem;font-weight:500;color:#2C2C2A;margin-bottom:2px;}
#hra-wrap .hra-rbody p{font-size:0.79rem;color:#5C5C58;line-height:1.6;font-weight:300;}

#hra-wrap .hra-div{height:1px;background:rgba(44,44,42,0.1);margin:1.5rem 0;}
#hra-wrap .hra-ctas{margin-top:1.5rem;}
#hra-wrap .hra-ctlbl{font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:#9A9A94;text-align:center;margin-bottom:0.85rem;font-weight:500;}
#hra-wrap .hra-ctgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:440px){#hra-wrap .hra-ctgrid{grid-template-columns:1fr;}}
#hra-wrap .hra-cta{display:block;padding:1.1rem 1rem;border-radius:12px;text-decoration:none;text-align:center;transition:border-color 0.18s;}
#hra-wrap .hra-cta.cm{border:1px solid #C5D4C6;background:#EEF3EE;}
#hra-wrap .hra-cta.cr{border:1px solid #D4C4A8;background:#F5EFE6;}
#hra-wrap .hra-ctico{font-size:1.3rem;display:block;margin-bottom:0.4rem;}
#hra-wrap .hra-cttl{font-family:'Cormorant Garamond',serif;font-size:0.95rem;font-weight:600;display:block;margin-bottom:0.25rem;line-height:1.3;}
#hra-wrap .hra-cta.cm .hra-cttl{color:#3B6D11;}
#hra-wrap .hra-cta.cr .hra-cttl{color:#8C7355;}
#hra-wrap .hra-ctsub{font-size:0.74rem;color:#5C5C58;font-weight:300;line-height:1.5;display:block;}
#hra-wrap .hra-foot{text-align:center;font-size:0.7rem;color:#9A9A94;margin-top:1.75rem;font-weight:300;line-height:1.6;}

/* REMINDER BANNER */
#hra-wrap .hra-reminder{display:flex;align-items:flex-start;gap:10px;background:#F5EFE6;border:1px solid #D4C4A8;border-radius:8px;padding:0.85rem 1rem;margin-bottom:1.25rem;font-size:0.8rem;color:#5C5C58;line-height:1.55;font-weight:300;}
#hra-wrap .hra-reminder strong{font-weight:500;color:#2C2C2A;}
#hra-wrap .hra-reminder-icon{font-size:1rem;flex-shrink:0;margin-top:1px;}

/* RETAKE + SHARE */
#hra-wrap .hra-retake{background:#EEF3EE;border:1px solid #C5D4C6;border-radius:8px;padding:0.9rem 1rem;margin-bottom:0.75rem;}
#hra-wrap .hra-retake-title{font-size:0.82rem;font-weight:500;color:#2C2C2A;margin-bottom:4px;}
#hra-wrap .hra-retake-body{font-size:0.77rem;color:#5C5C58;line-height:1.55;font-weight:300;}
#hra-wrap .hra-retake-body strong{font-weight:500;color:#2C2C2A;}
#hra-wrap .hra-share{background:#F5EFE6;border:1px solid #D4C4A8;border-radius:8px;padding:0.9rem 1rem;margin-bottom:0.75rem;}
#hra-wrap .hra-share-title{font-size:0.82rem;font-weight:500;color:#2C2C2A;margin-bottom:4px;}
#hra-wrap .hra-share-body{font-size:0.77rem;color:#5C5C58;line-height:1.55;font-weight:300;margin-bottom:6px;}
#hra-wrap .hra-share-link{font-size:0.77rem;color:#8C7355;font-weight:400;word-break:break-all;}

/* SAVE BUTTONS */
#hra-wrap .hra-save-row{display:flex;gap:10px;margin-bottom:1.25rem;}
#hra-wrap .hra-save-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:10px 14px;border-radius:8px;font-family:'Jost',sans-serif;font-size:0.82rem;font-weight:400;cursor:pointer;transition:all 0.15s;}
#hra-wrap .hra-save-btn.print{border:1px solid rgba(44,44,42,0.2);background:transparent;color:#5C5C58;}
#hra-wrap .hra-save-btn.print:hover{border-color:#8A9E8C;color:#2C2C2A;background:#EEF3EE;}
#hra-wrap .hra-save-btn.email{border:1px solid #C5D4C6;background:#EEF3EE;color:#3B6D11;}
#hra-wrap .hra-save-btn.email:hover{background:#C5D4C6;}
@media(max-width:400px){#hra-wrap .hra-save-row{flex-direction:column;}}

/* PRINT STYLES */
@media print {
  body * { visibility: hidden; }
  #hra-print-zone, #hra-print-zone * { visibility: visible; }
  #hra-print-zone { position: absolute; left: 0; top: 0; width: 100%; padding: 2rem; }
  .hra-save-row, .hra-ctas, .hra-prog, .hra-hero { display: none !important; }
  #hra-wrap { max-width: 100%; padding: 0; }
  .hra-bar-fill { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
  .hra-bar-status, .hra-pill, .sg, .sa, .sr, .hra-rstatus { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
  .hra-circle-fg { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
}
</style>

<div id="hra-wrap">
  <div class="hra-hero">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M24 4L3 21V45H17V31H31V45H45V21L24 4Z" stroke="#8A9E8C" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
      <circle cx="24" cy="19" r="3.5" stroke="#C4A882" stroke-width="1.4" fill="none"/>
    </svg>
    <h1>First-Time Home<br>Readiness Assessment</h1>
    <p>Answer 8 questions to understand where you stand — and get a personalized breakdown of your next steps.</p>
  </div>
  <div class="hra-prog">
    <div class="hra-prog-track"><div class="hra-prog-fill" id="hra-pbar"></div></div>
    <span class="hra-prog-lbl" id="hra-plbl">Question 1 of 8</span>
  </div>
  <div id="hra-main"></div>
</div>

<script>
(function(){
var questions=[
  {text:"How long have you been thinking about buying a home?",cat:"timeline",opts:[{l:"Just starting to explore",p:1},{l:"A few months",p:2},{l:"Six to twelve months",p:3},{l:"I'm ready to move now",p:4}]},
  {text:"Do you know your current credit score?",cat:"credit",opts:[{l:"No idea",p:1},{l:"I think it's below 620",p:2},{l:"Somewhere between 620 and 679",p:3},{l:"680 or above",p:4}]},
  {text:"Have you spoken with a lender or mortgage broker yet?",cat:"mortgage",opts:[{l:"No, not yet",p:1},{l:"Done some online research",p:2},{l:"Had a conversation with one",p:3},{l:"I'm pre-approved",p:4}]},
  {text:"How much have you saved toward a down payment?",cat:"savings",opts:[{l:"Nothing set aside yet",p:1},{l:"Less than $5,000",p:2},{l:"$5,000 to $20,000",p:3},{l:"More than $20,000",p:4}]},
  {text:"How stable is your current income and employment?",cat:"employment",opts:[{l:"Still working on it",p:1},{l:"Self-employed or variable income",p:2},{l:"Employed for one to two years",p:3},{l:"Stable employment for two or more years",p:4}]},
  {text:"Have you started exploring homes or neighborhoods?",cat:"search",opts:[{l:"Not yet",p:1},{l:"Browsing online casually",p:2},{l:"I have specific areas in mind",p:3},{l:"I've toured homes in person",p:4}]},
  {text:"How well do you understand the home buying process?",cat:"knowledge",opts:[{l:"It feels overwhelming",p:1},{l:"I know a little",p:2},{l:"Fairly comfortable with the basics",p:3},{l:"I feel confident and informed",p:4}]},
  {text:"When do you hope to be in a new home?",cat:"urgency",opts:[{l:"Two or more years from now",p:1},{l:"Within twelve to twenty-four months",p:2},{l:"Within six to twelve months",p:3},{l:"Within three to six months",p:4}]}
];
var ins={
  timeline:{lb:"Timeline",fb:[{mx:1,s:"a",t:"Early exploration",d:"You're at the very beginning — a great time to learn what the process looks like before committing."},{mx:3,s:"a",t:"Building momentum",d:"You're developing your timeline. Aligning it with your financial readiness will help you move with clarity."},{mx:4,s:"g",t:"Ready to move",d:"A clear timeline is one of the most powerful tools in a buyer's toolkit. You're positioned to act decisively."}]},
  credit:{lb:"Credit readiness",fb:[{mx:1,s:"r",t:"Check credit first",d:"Your credit score is the foundation of mortgage eligibility. Pull a free report at AnnualCreditReport.com to understand where you stand."},{mx:2,s:"r",t:"Improvement needed",d:"A score below 620 limits your loan options. Paying down debt and avoiding new credit inquiries can move the needle within months."},{mx:3,s:"a",t:"Getting there",d:"You're in a workable range, but improving to 700+ can unlock better rates and save you thousands over the life of your loan."},{mx:4,s:"g",t:"Strong foundation",d:"A score of 680 or above opens the door to competitive mortgage products. Keep maintaining healthy credit habits."}]},
  mortgage:{lb:"Mortgage readiness",fb:[{mx:1,s:"a",t:"Start the conversation",d:"Speaking with a lender is often the first step buyers skip — and the most important one. Even a brief conversation clarifies your real buying power."},{mx:2,s:"a",t:"Research is a start",d:"Online tools give estimates, but a real conversation with a lender gives you actual numbers tailored to your situation."},{mx:3,s:"a",t:"Good progress",d:"You've started the conversation. The next step is getting a pre-approval letter, which signals to sellers that you're a serious buyer."},{mx:4,s:"g",t:"Pre-approved",d:"Pre-approval is a competitive advantage. You know your budget and can move quickly when the right home appears."}]},
  savings:{lb:"Down payment",fb:[{mx:1,s:"r",t:"Savings plan needed",d:"Setting even a small automatic transfer each month builds momentum. Many first-time buyer programs require as little as 3 to 3.5% down."},{mx:2,s:"a",t:"A start has been made",d:"You have a foundation. Look into Down Payment Assistance programs in Texas — many buyers qualify without knowing it."},{mx:3,s:"a",t:"Good progress",d:"Depending on your target price range, you may be close to ready. A lender can confirm exactly what you need."},{mx:4,s:"g",t:"Solid position",d:"Having $20,000 or more saved gives you flexibility for down payment, closing costs, and a reserve fund after closing."}]},
  employment:{lb:"Employment",fb:[{mx:1,s:"r",t:"Stability needed",d:"Lenders require documented, consistent income. Building a stable employment record now will strengthen your application."},{mx:2,s:"a",t:"Pathways exist",d:"Variable or self-employed income is qualifying — but requires two years of tax returns and additional documentation. A lender can walk you through it."},{mx:3,s:"a",t:"On track",d:"One to two years of employment is often sufficient. Lenders want to see stability, not necessarily longevity."},{mx:4,s:"g",t:"Stable — green flag",d:"Two or more years with consistent income is what lenders look for. You're in a strong position here."}]},
  search:{lb:"Home search",fb:[{mx:1,s:"a",t:"Ready to explore",d:"Researching neighborhoods now — before you're under deadline — gives you the perspective to make a confident choice later."},{mx:2,s:"a",t:"Browsing stage",d:"Online listings paint a partial picture. Understanding price per square foot, school districts, and commute patterns takes it deeper."},{mx:3,s:"g",t:"Clear focus",d:"Knowing your target neighborhoods helps you and your agent work efficiently. You're ahead of many first-time buyers."},{mx:4,s:"g",t:"Active & informed",d:"In-person tours sharpen your instincts fast. You'll recognize the right home quickly when it comes along."}]},
  knowledge:{lb:"Process knowledge",fb:[{mx:1,s:"a",t:"Gaps are normal",d:"Most first-time buyers start here. Working with an experienced agent means you don't have to figure it out alone."},{mx:2,s:"a",t:"Building foundation",d:"A little knowledge goes a long way — and asking questions is always the right move. Every step forward counts."},{mx:3,s:"g",t:"Solid baseline",d:"You understand the core process. A good agent will fill in the rest and protect your interests along the way."},{mx:4,s:"g",t:"Informed buyer",d:"Confidence in the process allows you to focus on what matters most — finding the right home at the right price."}]},
  urgency:{lb:"Urgency",fb:[{mx:1,s:"a",t:"Long horizon",d:"Two or more years is ample time to build credit, save, and research. A plan started today compounds significantly."},{mx:2,s:"a",t:"1–2 years out",d:"This is the ideal window to get pre-qualified and start learning the market without pressure."},{mx:3,s:"a",t:"6–12 months out",d:"Six to twelve months means you should be building your financial profile and speaking with professionals now."},{mx:4,s:"g",t:"Ready soon",d:"A three to six month window means it's time to act. Pre-approval, neighborhood clarity, and a trusted agent are your three priorities."}]}
};

var cur=0,ans={};
var circumference=2*Math.PI*54;

function getFb(cat,pts){var fb=ins[cat].fb;for(var i=0;i<fb.length;i++){if(pts<=fb[i].mx)return fb[i];}return fb[fb.length-1];}

function setProg(step){
  var pct=Math.round((step/questions.length)*100);
  document.getElementById('hra-pbar').style.width=pct+'%';
  document.getElementById('hra-plbl').textContent=step>=questions.length?'Complete':'Question '+(step+1)+' of '+questions.length;
}

function render(idx){
  setProg(idx);
  var q=questions[idx],sel=ans[idx],isLast=idx===questions.length-1,opts='';
  for(var i=0;i<q.opts.length;i++){
    var o=q.opts[i],isSel=sel&&sel.i===i;
    opts+='<button class="hra-opt'+(isSel?' sel':'')+'" onclick="hraApp.pick('+idx+','+i+','+o.p+')"><span class="hra-dot"></span>'+o.l+'</button>';
  }
  document.getElementById('hra-main').innerHTML=
    '<div class="hra-card"><div class="hra-qnum">Question '+(idx+1)+' of '+questions.length+'</div><div class="hra-qtext">'+q.text+'</div><div class="hra-opts">'+opts+'</div></div>'+
    '<div class="hra-nav"><button class="hra-back" onclick="hraApp.back()"'+(idx===0?' disabled':'')+'>&#8592; Back</button>'+
    '<button class="hra-next" onclick="hraApp.next()"'+(sel?'':' disabled')+'>'+(isLast?'See My Results &#8594;':'Next &#8594;')+'</button></div>';
}

function next(){if(!ans[cur])return;cur++;if(cur>=questions.length){showResults();}else{render(cur);}}
function back(){if(cur>0){cur--;render(cur);}}
function pick(qi,oi,pts){ans[qi]={i:oi,pts:pts};render(qi);}

function getColor(s){return s==='g'?'#8A9E8C':s==='a'?'#C4A882':'#C4847A';}
function getStatusLabel(s){return s==='g'?'On track':s==='a'?'In progress':'Needs attention';}

  if(ratio>=0.75){r='Ready to Begin';pc='pr';intro="Your answers suggest you're in a strong position to start your home buying journey in earnest. The next step is connecting with the right professionals to turn your readiness into action.";}
  else if(ratio>=0.45){r='Building Readiness';pc='pm';intro="You've made meaningful progress, but a few key areas would benefit from attention before you move forward. Use the insights below to prioritize your next steps.";}
  else{r='Early Stage';pc='pe';intro="You're in the learning and building phase — which is exactly where many successful homeowners started. Each step you take now creates real momentum for later.";}

  var strokeColor=ratio>=0.75?'#8A9E8C':ratio>=0.45?'#C4A882':'#C4847A';
  var offset=circumference-(ratio*circumference);

  var bars='';
  var catOrder=['credit','savings','employment','mortgage','timeline','search','knowledge','urgency'];
  for(var ci=0;ci<catOrder.length;ci++){
    var cat=catOrder[ci];
    var qi=-1;
    for(var qi2=0;qi2<questions.length;qi2++){if(questions[qi2].cat===cat){qi=qi2;break;}}
    if(qi<0||!ans[qi])continue;
    var fb=getFb(cat,ans[qi].pts);
    var barPct=Math.round((ans[qi].pts/4)*100);
    bars+='<div class="hra-bar-row">'+
      '<div class="hra-bar-top">'+
