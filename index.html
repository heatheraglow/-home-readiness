<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>First-Time Home Readiness Assessment</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sage: #8A9E8C;
  --sage-light: #EEF3EE;
  --sage-mid: #C5D4C6;
  --warm-light: #F5EFE6;
  --warm-dark: #8C7355;
  --text: #2C2C2A;
  --text-mid: #5C5C58;
  --text-soft: #9A9A94;
  --border: rgba(44,44,42,0.12);
  --border-mid: rgba(44,44,42,0.2);
  --white: #FDFCFA;
  --radius: 12px;
  --radius-sm: 8px;
}

html, body {
  font-family: 'Jost', sans-serif;
  background: var(--white);
  color: var(--text);
  width: 100%;
  margin: 0;
  padding: 0;
}

.page {
  max-width: 620px;
  margin: 0 auto;
  padding: 2.5rem 1.25rem 3rem;
}

.hero {
  text-align: center;
  margin-bottom: 2rem;
}

.hero-svg {
  display: block;
  margin: 0 auto 1rem;
  opacity: 0.65;
}

.hero h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.85rem;
  font-weight: 500;
  line-height: 1.25;
  color: var(--text);
  margin-bottom: 0.65rem;
  letter-spacing: 0.01em;
}

.hero p {
  font-size: 0.875rem;
  color: var(--text-mid);
  line-height: 1.7;
  max-width: 400px;
  margin: 0 auto;
  font-weight: 300;
}

.progress-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1.75rem;
}

.progress-track {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--sage);
  border-radius: 99px;
  transition: width 0.45s ease;
  width: 0%;
}

.progress-label {
  font-size: 0.72rem;
  color: var(--text-soft);
  white-space: nowrap;
  font-weight: 400;
  letter-spacing: 0.05em;
}

.q-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  margin-bottom: 1rem;
}

.q-num {
  font-size: 0.68rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--sage);
  margin-bottom: 0.5rem;
  font-weight: 500;
}

.q-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 1.25rem;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.opt {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 10px 13px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: transparent;
  font-family: 'Jost', sans-serif;
  font-size: 0.855rem;
  font-weight: 300;
  color: var(--text-mid);
  cursor: pointer;
  text-align: left;
  transition: border-color 0.15s, background 0.15s, color 0.15s;
  width: 100%;
  line-height: 1.4;
}

.opt:hover {
  border-color: var(--sage-mid);
  background: var(--sage-light);
  color: var(--text);
}

.opt.selected {
  border-color: var(--sage);
  background: var(--sage-light);
  color: var(--text);
}

.opt-dot {
  width: 14px;
  height: 14px;
  min-width: 14px;
  border-radius: 50%;
  border: 1.5px solid var(--border-mid);
  position: relative;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s;
}

.opt.selected .opt-dot {
  border-color: var(--sage);
  background: var(--sage);
}

.opt.selected .opt-dot::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px; right: 3px; bottom: 3px;
  background: white;
  border-radius: 50%;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 1.25rem;
  gap: 10px;
}

.btn-back {
  padding: 9px 16px;
  border: 1px solid var(--border-mid);
  border-radius: var(--radius-sm);
  background: transparent;
  font-family: 'Jost', sans-serif;
  font-size: 0.83rem;
  font-weight: 400;
  color: var(--text-soft);
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
}

.btn-back:hover { color: var(--text); border-color: var(--text-mid); }
.btn-back:disabled { opacity: 0.28; cursor: default; pointer-events: none; }

.btn-next {
  padding: 10px 24px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--sage);
  font-family: 'Jost', sans-serif;
  font-size: 0.855rem;
  font-weight: 500;
  color: white;
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: background 0.15s, opacity 0.15s;
}

.btn-next:hover { background: #768E78; }
.btn-next:disabled { opacity: 0.32; cursor: default; pointer-events: none; }

.results-header {
  text-align: center;
  margin-bottom: 1.75rem;
}

.results-header h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.7rem;
  font-weight: 500;
  margin-bottom: 0.4rem;
  color: var(--text);
}

.score-pill {
  display: inline-block;
  padding: 3px 14px;
  border-radius: 99px;
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  margin-bottom: 0.65rem;
}

.pill-ready    { background: #EAF3DE; color: #3B6D11; }
.pill-progress { background: #FAEEDA; color: #854F0B; }
.pill-early    { background: #F5EFE6; color: #8C7355; }

.results-intro {
  font-size: 0.855rem;
  color: var(--text-mid);
  line-height: 1.7;
  font-weight: 300;
  max-width: 460px;
  margin: 0 auto;
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 1.5rem 0;
}

.section-label {
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-soft);
  margin-bottom: 0.85rem;
  font-weight: 500;
}

.result-item {
  display: flex;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.result-item:last-child { border-bottom: none; }

.result-status {
  width: 20px;
  height: 20px;
  min-width: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  font-weight: 600;
  margin-top: 2px;
}

.status-green { background: #EAF3DE; color: #3B6D11; }
.status-amber { background: #FAEEDA; color: #854F0B; }
.status-red   { background: #FCEBEB; color: #A32D2D; }

.result-body strong {
  display: block;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 2px;
}

.result-body p {
  font-size: 0.8rem;
  color: var(--text-mid);
  line-height: 1.6;
  font-weight: 300;
}

.cta-section { margin-top: 1.75rem; }

.cta-label {
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-soft);
  text-align: center;
  margin-bottom: 0.85rem;
  font-weight: 500;
}

.cta-cards {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

@media (max-width: 440px) {
  .cta-cards { grid-template-columns: 1fr; }
}

.cta-card {
  display: block;
  padding: 1.1rem 1rem;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  text-decoration: none;
  text-align: center;
  transition: border-color 0.18s;
  background: var(--white);
}

.cta-card:hover { border-color: var(--sage-mid); }

.cta-card.mortgage {
  border-color: var(--sage-mid);
  background: var(--sage-light);
}

.cta-card.realtor {
  border-color: #D4C4A8;
  background: var(--warm-light);
}

.cta-icon {
  font-size: 1.3rem;
  display: block;
  margin-bottom: 0.4rem;
}

.cta-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  display: block;
  margin-bottom: 0.25rem;
  line-height: 1.3;
}

.cta-sub {
  font-size: 0.74rem;
  color: var(--text-mid);
  font-weight: 300;
  line-height: 1.5;
  display: block;
}

.cta-card.mortgage .cta-title { color: #3B6D11; }
.cta-card.realtor .cta-title  { color: var(--warm-dark); }

.footer-note {
  text-align: center;
  font-size: 0.7rem;
  color: var(--text-soft);
  margin-top: 1.75rem;
  font-weight: 300;
  line-height: 1.6;
}
</style>
</head>
<body>
<div class="page">

  <div class="hero">
    <svg class="hero-svg" width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M24 4L3 21V45H17V31H31V45H45V21L24 4Z" stroke="#8A9E8C" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
      <circle cx="24" cy="19" r="3.5" stroke="#C4A882" stroke-width="1.4" fill="none"/>
    </svg>
    <h1>First-Time Home<br>Readiness Assessment</h1>
    <p>Answer 8 questions to understand where you stand — and get a personalized breakdown of your next steps.</p>
  </div>

  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="pbar"></div>
    </div>
    <span class="progress-label" id="plabel">Question 1 of 8</span>
  </div>

  <div id="main"></div>

</div>

<script>
var questions = [
  { text: "How long have you been thinking about buying a home?", cat: "timeline", opts: [
    { label: "Just starting to explore", pts: 1 },
    { label: "A few months", pts: 2 },
    { label: "Six to twelve months", pts: 3 },
    { label: "I'm ready to move now", pts: 4 }
  ]},
  { text: "Do you know your current credit score?", cat: "credit", opts: [
    { label: "No idea", pts: 1 },
    { label: "I think it's below 620", pts: 2 },
    { label: "Somewhere between 620 and 679", pts: 3 },
    { label: "680 or above", pts: 4 }
  ]},
  { text: "Have you spoken with a lender or mortgage broker yet?", cat: "mortgage", opts: [
    { label: "No, not yet", pts: 1 },
    { label: "Done some online research", pts: 2 },
    { label: "Had a conversation with one", pts: 3 },
    { label: "I'm pre-approved", pts: 4 }
  ]},
  { text: "How much have you saved toward a down payment?", cat: "savings", opts: [
    { label: "Nothing set aside yet", pts: 1 },
    { label: "Less than $5,000", pts: 2 },
    { label: "$5,000 to $20,000", pts: 3 },
    { label: "More than $20,000", pts: 4 }
  ]},
  { text: "How stable is your current income and employment?", cat: "employment", opts: [
    { label: "Still working on it", pts: 1 },
    { label: "Self-employed or variable income", pts: 2 },
    { label: "Employed for one to two years", pts: 3 },
    { label: "Stable employment for two or more years", pts: 4 }
  ]},
  { text: "Have you started exploring homes or neighborhoods?", cat: "search", opts: [
    { label: "Not yet", pts: 1 },
    { label: "Browsing online casually", pts: 2 },
    { label: "I have specific areas in mind", pts: 3 },
    { label: "I've toured homes in person", pts: 4 }
  ]},
  { text: "How well do you understand the home buying process?", cat: "knowledge", opts: [
    { label: "It feels overwhelming", pts: 1 },
    { label: "I know a little", pts: 2 },
    { label: "Fairly comfortable with the basics", pts: 3 },
    { label: "I feel confident and informed", pts: 4 }
  ]},
  { text: "When do you hope to be in a new home?", cat: "urgency", opts: [
    { label: "Two or more years from now", pts: 1 },
    { label: "Within twelve to twenty-four months", pts: 2 },
    { label: "Within six to twelve months", pts: 3 },
    { label: "Within three to six months", pts: 4 }
  ]}
];

var insights = {
  timeline:   { label: "Your timeline",         fb: [{ max:1, s:"amber", t:"Early exploration stage",          d:"You're at the very beginning — a great time to learn what the process looks like before committing." },{ max:3, s:"amber", t:"Building momentum",               d:"You're developing your timeline. Aligning it with your financial readiness will help you move with clarity." },{ max:4, s:"green", t:"You're ready to move",            d:"A clear timeline is one of the most powerful tools in a buyer's toolkit. You're positioned to act decisively." }] },
  credit:     { label: "Credit readiness",       fb: [{ max:1, s:"red",   t:"Check your credit first",          d:"Your credit score is the foundation of your mortgage eligibility. Pull a free report at AnnualCreditReport.com to understand where you stand." },{ max:2, s:"red",   t:"Credit improvement needed",       d:"A score below 620 limits your loan options. Paying down debt and avoiding new credit inquiries can move the needle within months." },{ max:3, s:"amber", t:"Getting there",                   d:"You're in a workable range, but improving to 700+ can unlock better rates and save you thousands over the life of your loan." },{ max:4, s:"green", t:"Strong credit foundation",         d:"A score of 680 or above opens the door to competitive mortgage products. Keep maintaining healthy credit habits." }] },
  mortgage:   { label: "Mortgage readiness",     fb: [{ max:1, s:"amber", t:"Start the lender conversation",    d:"Speaking with a lender is often the first step buyers skip — and the most important one. Even a brief conversation clarifies your real buying power." },{ max:2, s:"amber", t:"Research is a start",              d:"Online tools give estimates, but a real conversation with a lender gives you actual numbers tailored to your situation." },{ max:3, s:"amber", t:"Good progress",                    d:"You've started the conversation. The next step is getting a pre-approval letter, which signals to sellers that you're a serious buyer." },{ max:4, s:"green", t:"Pre-approved and ready",           d:"Pre-approval is a competitive advantage. You know your budget and can move quickly when the right home appears." }] },
  savings:    { label: "Down payment savings",   fb: [{ max:1, s:"red",   t:"Savings plan needed",              d:"Setting even a small automatic transfer each month builds momentum. Many first-time buyer programs require as little as 3 to 3.5% down." },{ max:2, s:"amber", t:"A start has been made",            d:"You have a foundation. Look into Down Payment Assistance programs in Texas — many buyers qualify without knowing it." },{ max:3, s:"amber", t:"Good progress",                    d:"Depending on your target price range, you may be close to ready. A lender can confirm exactly what you need." },{ max:4, s:"green", t:"Savings position is solid",        d:"Having $20,000 or more saved gives you flexibility for down payment, closing costs, and a reserve fund after closing." }] },
  employment: { label: "Employment stability",   fb: [{ max:1, s:"red",   t:"Income stability is key",          d:"Lenders require documented, consistent income. Building a stable employment record now will strengthen your application." },{ max:2, s:"amber", t:"Self-employment has pathways",     d:"Variable or self-employed income is qualifying — but requires two years of tax returns and additional documentation. A lender can walk you through it." },{ max:3, s:"amber", t:"On track",                         d:"One to two years of employment is often sufficient. Lenders want to see stability, not necessarily longevity." },{ max:4, s:"green", t:"Stable employment — a green flag",  d:"Two or more years with consistent income is what lenders look for. You're in a strong position here." }] },
  search:     { label: "Home search progress",   fb: [{ max:1, s:"amber", t:"Ready to explore",                 d:"Researching neighborhoods now — before you're under deadline — gives you the perspective to make a confident choice later." },{ max:2, s:"amber", t:"Casual browsing is a start",       d:"Online listings paint a partial picture. Understanding price per square foot, school districts, and commute patterns takes it deeper." },{ max:3, s:"green", t:"Clear focus is valuable",           d:"Knowing your target neighborhoods helps you and your agent work efficiently. You're ahead of many first-time buyers." },{ max:4, s:"green", t:"Active and informed",               d:"In-person tours sharpen your instincts fast. You'll recognize the right home quickly when it comes along." }] },
  knowledge:  { label: "Process knowledge",      fb: [{ max:1, s:"amber", t:"Knowledge gaps are normal",        d:"Most first-time buyers start here. Working with an experienced agent means you don't have to figure it out alone." },{ max:2, s:"amber", t:"Building your foundation",          d:"A little knowledge goes a long way — and asking questions is always the right move. Every step forward counts." },{ max:3, s:"green", t:"Solid baseline",                    d:"You understand the core process. A good agent will fill in the rest and protect your interests along the way." },{ max:4, s:"green", t:"Informed buyer",                    d:"Confidence in the process allows you to focus on what matters most — finding the right home at the right price." }] },
  urgency:    { label: "Your urgency",           fb: [{ max:1, s:"amber", t:"Long horizon — use the time wisely",d:"Two or more years is ample time to build credit, save, and research. A plan started today compounds significantly." },{ max:2, s:"amber", t:"One to two years out",              d:"This is the ideal window to get pre-qualified and start learning the market without pressure." },{ max:3, s:"amber", t:"Approaching active search territory",d:"Six to twelve months means you should be building your financial profile and speaking with professionals now." },{ max:4, s:"green", t:"Ready to move soon",                d:"A three to six month window means it's time to act. Pre-approval, neighborhood clarity, and a trusted agent are your three priorities." }] }
};

var current = 0;
var answers = {};

function getFb(cat, pts) {
  var list = insights[cat].fb;
  for (var i = 0; i < list.length; i++) { if (pts <= list[i].max) return list[i]; }
  return list[list.length - 1];
}

function setProgress(step) {
  var pct = Math.round((step / questions.length) * 100);
  document.getElementById('pbar').style.width = pct + '%';
  document.getElementById('plabel').textContent = step >= questions.length ? 'Complete' : 'Question ' + (step + 1) + ' of ' + questions.length;
}

function render(idx) {
  setProgress(idx);
  var q = questions[idx];
  var sel = answers[idx];
  var isLast = idx === questions.length - 1;
  var opts = '';
  for (var oi = 0; oi < q.opts.length; oi++) {
    var o = q.opts[oi];
    var isSel = sel && sel.idx === oi;
    opts += '<button class="opt' + (isSel ? ' selected' : '') + '" onclick="pick(' + idx + ',' + oi + ',' + o.pts + ')">' +
      '<span class="opt-dot"></span>' + o.label + '</button>';
  }
  document.getElementById('main').innerHTML =
    '<div class="q-card">' +
      '<div class="q-num">Question ' + (idx+1) + ' of ' + questions.length + '</div>' +
      '<div class="q-text">' + q.text + '</div>' +
      '<div class="options">' + opts + '</div>' +
    '</div>' +
    '<div class="nav">' +
      '<button class="btn-back" onclick="back()"' + (idx===0 ? ' disabled' : '') + '>&larr; Back</button>' +
      '<button class="btn-next" onclick="next()"' + (sel ? '' : ' disabled') + '>' + (isLast ? 'See My Results &rarr;' : 'Next &rarr;') + '</button>' +
    '</div>';
}

function pick(qi, oi, pts) {
  answers[qi] = { idx: oi, pts: pts };
  render(qi);
}

function next() {
  if (!answers[current]) return;
  current++;
  if (current >= questions.length) { showResults(); }
  else { render(current); tryScroll(); }
}

function back() {
  if (current > 0) { current--; render(current); tryScroll(); }
}

function tryScroll() {
  try { window.scrollTo(0,0); } catch(e){}
  try { document.documentElement.scrollTop = 0; } catch(e){}
  try { document.body.scrollTop = 0; } catch(e){}
}

function showResults() {
  setProgress(questions.length);
  var total = 0;
  for (var k in answers) { total += answers[k].pts; }
  var ratio = total / (questions.length * 4);
  var r, pc, intro;
  if (ratio >= 0.75) {
    r = 'Ready to Begin'; pc = 'pill-ready';
    intro = "Your answers suggest you're in a strong position to start your home buying journey in earnest. The next step is connecting with the right professionals to turn your readiness into action.";
  } else if (ratio >= 0.45) {
    r = 'Building Readiness'; pc = 'pill-progress';
    intro = "You've made meaningful progress, but a few key areas would benefit from attention before you move forward. Use the insights below to prioritize your next steps.";
  } else {
    r = 'Early Stage'; pc = 'pill-early';
    intro = "You're in the learning and building phase — which is exactly where many successful homeowners started. Each step you take now creates real momentum for later.";
  }
  var icons = { green: '&#10003;', amber: '&sim;', red: '!' };
  var items = '';
  for (var i = 0; i < questions.length; i++) {
    var a = answers[i]; if (!a) continue;
    var q = questions[i];
    var fb = getFb(q.cat, a.pts);
    items += '<div class="result-item">' +
      '<div class="result-status status-' + fb.s + '">' + icons[fb.s] + '</div>' +
      '<div class="result-body"><strong>' + insights[q.cat].label + ': ' + fb.t + '</strong><p>' + fb.d + '</p></div>' +
      '</div>';
  }
  document.getElementById('main').innerHTML =
    '<div class="results-header">' +
      '<span class="score-pill ' + pc + '">' + r + '</span>' +
      '<h2>Your Readiness Snapshot</h2>' +
      '<p class="results-intro">' + intro + '</p>' +
    '</div>' +
    '<div class="divider"></div>' +
    '<div class="section-label">Area by area breakdown</div>' +
    items +
    '<div class="divider"></div>' +
    '<div class="cta-section">' +
      '<p class="cta-label">When you\'re ready to take the next step</p>' +
      '<div class="cta-cards">' +
        '<a class="cta-card mortgage" href="https://edge.finlocker.com/pfm/registration/invite?key=cb3df57d-e147-4b59-a3ca-1df882d09d1c" target="_blank" rel="noopener">' +
          '<span class="cta-icon">&#127970;</span>' +
          '<span class="cta-title">Connect with a Mortgage Professional</span>' +
          '<span class="cta-sub">Start your financial readiness profile and explore your loan options.</span>' +
        '</a>' +
        '<a class="cta-card realtor" href="https://tally.so/r/XxoG5Y" target="_blank" rel="noopener">' +
          '<span class="cta-icon">&#127968;</span>' +
          '<span class="cta-title">Connect with a Real Estate Professional</span>' +
          '<span class="cta-sub">Work with an experienced agent who knows the North DFW market.</span>' +
        '</a>' +
      '</div>' +
    '</div>' +
    '<p class="footer-note">This assessment is for educational purposes only and does not constitute financial or legal advice. Results are based on self-reported answers.</p>';
  tryScroll();
}

render(0);
</script>
</body>
</html>
